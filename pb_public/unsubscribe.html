<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>退订评论回复通知</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        background: #f7f8fb;
        color: #111;
      }
      main {
        max-width: 640px;
        margin: 48px auto;
        padding: 24px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 1.7rem;
      }
      p {
        line-height: 1.75;
      }
      button {
        margin-top: 16px;
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
      }
      button.secondary {
        background: #6b7280;
        margin-left: 12px;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      a {
        color: #2563eb;
      }
      .notice {
        margin-top: 24px;
        padding: 16px;
        border-radius: 10px;
        background: #eef2ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>退订评论回复提醒</h1>
      <div id="status">正在加载退订信息……</div>
      <div id="content" style="display:none;">
        <div>
          <button id="unsubscribe-comment">退订此评论的后续回复通知</button>
          <button id="unsubscribe-all" class="secondary">退订所有评论的后续回复通知</button>
        </div>
        <div class="notice">
          <p>若您希望继续收到回复提醒，请勿点击上述按钮。</p>
        </div>
      </div>
    </main>
    <script>
      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name) || "";
      }

      function setStatus(message, isError) {
        const status = document.getElementById("status");
        status.textContent = message;
        status.style.color = isError ? "#b91c1c" : "#111";
      }

      function setContentVisible(visible) {
        document.getElementById("content").style.display = visible ? "block" : "none";
      }

      async function fetchInfo(token) {
        const resp = await fetch(`/api/unsubscribe?token=${encodeURIComponent(token)}`);
        if (!resp.ok) {
          const error = await resp.json().catch(() => null);
          throw new Error(error?.message || "无法获取退订信息");
        }
        return await resp.json();
      }

      async function submitUnsubscribe(token, action) {
        const buttonComment = document.getElementById("unsubscribe-comment");
        const buttonAll = document.getElementById("unsubscribe-all");
        buttonComment.disabled = true;
        buttonAll.disabled = true;

        try {
          const resp = await fetch("/api/unsubscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, action }),
          });
          const body = await resp.json();
          if (!resp.ok) {
            throw new Error(body?.message || "退订失败");
          }
          setStatus(body.message || "退订成功", false);
          setContentVisible(false);
        } catch (err) {
          setStatus(err.message || "操作失败，请稍后重试", true);
          buttonComment.disabled = false;
          buttonAll.disabled = false;
        }
      }

      async function init() {
        const token = getQueryParam("token");
        if (!token) {
          setStatus("缺少退订令牌，请使用邮件中的退订链接。", true);
          return;
        }

        try {
          fetchInfo(token);
          setContentVisible(true);
          setStatus("请选择您要执行的退订操作。", false);

          document.getElementById("unsubscribe-comment").onclick = () => submitUnsubscribe(token, "comment");
          document.getElementById("unsubscribe-all").onclick = () => submitUnsubscribe(token, "all");
        } catch (err) {
          setStatus(err.message || "无法加载退订信息。", true);
        }
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
